name: Update AltStore Source

on:
  release:
    types: [published]
  workflow_dispatch: 

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main # <- Risolve il problema della fotografia congelata

      - name: Update apps.json
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Prepariamo le variabili (se non c'è una release, usa v1.4 come test)
          FINAL_TAG=${TAG_NAME:-v1.4}
          CLEAN_VERSION=${FINAL_TAG//v/}
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${FINAL_TAG}/InOrario.ipa"
          
          echo "Sto per aggiornare la versione a: $CLEAN_VERSION"
          echo "Il link sarà: $DOWNLOAD_URL"
          
          # 2. Controllo di sicurezza: il file esiste davvero?
          if [ ! -f "apps.json" ]; then
            echo "ERRORE CRITICO: Il file apps.json non esiste nella cartella principale!"
            echo "Ecco i file presenti in questa cartella:"
            ls -la
            exit 1
          fi

          # 3. La magia di JQ (niente Python, niente problemi di spazi)
          jq ".apps[0].version = \"$CLEAN_VERSION\" | .apps[0].downloadURL = \"$DOWNLOAD_URL\"" apps.json > temp.json && mv temp.json apps.json
          
          echo "Aggiornamento JSON completato con successo!"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          
          # 4. Facciamo il commit SOLO se il file è cambiato davvero
          if ! git diff --cached --quiet; then
            git commit -m "Aggiornata versione AltStore a ${{ github.event.release.tag_name }}"
            git push origin main
          else
            echo "Nessuna modifica da salvare, la versione era già aggiornata."
          fi
