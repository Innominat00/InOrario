name: Update AltStore Source
on:
  release:
    types: [published]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Update JSON version
        run: |
          # Questo script usa 'jq' per cambiare la versione nel file apps.json
          # Prende il numero della versione dal tag della release (es. v1.2)
          VERSION=${{ github.event.release.tag_name }}
          URL="[https://github.com/$](https://github.com/$){{ github.repository }}/releases/download/${VERSION}/InOrario.ipa"
          
          # Comando per aggiornare il file (richiede che tu abbia jq configurato o usi python)
          python3 -c "
          import json
          with open('apps.json', 'r') as f:
              data = json.load(f)
          data['apps'][0]['version'] = '$VERSION'.replace('v', '')
          data['apps'][0]['downloadURL'] = '$URL'
          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add apps.json
          git commit -m "Auto-update apps.json to ${{ github.event.release.tag_name }}"
          git push
