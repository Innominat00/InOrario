name: Update AltStore Source

on:
  release:
    types: [published]
  workflow_dispatch: 

jobs:
  update-json:
    runs-on: ubuntu-latest
    # Diamo esplicitamente i permessi di scrittura per apps.json
    permissions:
      contents: write
    
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main # Forza il checkout sul branch main

      - name: Update JSON version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          # Fallback se avviato manualmente
          FINAL_TAG=${TAG_NAME:-v1.4}
          CLEAN_VERSION=${FINAL_TAG//v/}
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${FINAL_TAG}/InOrario.ipa"
          
          echo "Processing Version: $CLEAN_VERSION"
          
          export CLEAN_VERSION
          export DOWNLOAD_URL

          python3 -c "
import json, os

file_path = 'apps.json'
if not os.path.exists(file_path):
    print(f'FATAL: {file_path} not found')
    exit(1)

with open(file_path, 'r') as f:
    data = json.load(f)

ver = os.environ.get('CLEAN_VERSION')
url = os.environ.get('DOWNLOAD_URL')

# Cerchiamo l'app corretta nel JSON (solitamente la prima nella lista)
if 'apps' in data and len(data['apps']) > 0:
    data['apps'][0]['version'] = ver
    data['apps'][0]['downloadURL'] = url
    print(f'SUCCESS: Updated to {ver}')
else:
    print('ERROR: JSON structure invalid')
    exit(1)
    
with open(file_path, 'w') as f:
    json.dump(data, f, indent=2)
"

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add apps.json
          # Commit solo se ci sono cambiamenti, poi pusha su main
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update apps.json to ${{ github.event.release.tag_name }}"
            git push origin main
          else
            echo "No changes to commit"
          fi
